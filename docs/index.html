<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <!--
    viewport: width=device-width verhindert dass Mobile die Seite heranzoomt.
    viewport-fit=cover: füllt den Bereich hinter der iPhone-Notch.
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- CSP wird über Server-Header gesetzt, nicht via meta-tag,
       da Vite das bundled Script mit crossorigin injiziert -->


  <title>Discophery</title>

  <!-- Progressive-Web-App Metadaten -->
  <meta name="description" content="Persönlicher RSS-Feed – werbefreier News-Reader ähnlich Google Discover">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f2f2f7">
  <meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest"         href="/discophery/assets/manifest.json">
  <link rel="icon"             href="/discophery/assets/logo.png" type="image/png">
  <link rel="apple-touch-icon" href="/discophery/assets/logo.png">

  <!-- Open Graph (für das Teilen via URL) -->
  <meta property="og:title"       content="Discophery">
  <meta property="og:description" content="Persönlicher RSS-Feed – werbefreier News-Reader">
  <meta property="og:type"        content="website">



  <script type="module" crossorigin src="/discophery/assets/app.js"></script>
  <link rel="stylesheet" crossorigin href="/discophery/assets/index.css">
</head>
<body>

  <div id="app-shell">

    <!-- ── Header ────────────────────────────────────────────────── -->
    <header class="app-header" role="banner">

      <div class="app-header__logo-wrap">
        <img src="/discophery/assets/logo.png" alt="" class="app-header__logo-img">
        <span class="app-header__logo-text">Discophery</span>
      </div>

      <div class="app-header__search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="search" id="input-app-search" placeholder="Artikel suchen..." aria-label="Artikel durchsuchen">
      </div>

      <div class="app-header__actions">

        <!-- Feed-Manager-Button -->
        <button
          id="btn-open-feed-manager"
          class="icon-button"
          aria-label="Feeds verwalten"
          title="Feeds verwalten"
          aria-haspopup="dialog"
          aria-controls="feed-manager"
        >
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
               aria-hidden="true">
            <line x1="8"  y1="6"  x2="21" y2="6"></line>
            <line x1="8"  y1="12" x2="21" y2="12"></line>
            <line x1="8"  y1="18" x2="21" y2="18"></line>
            <line x1="3"  y1="6"  x2="3.01" y2="6"></line>
            <line x1="3"  y1="12" x2="3.01" y2="12"></line>
            <line x1="3"  y1="18" x2="3.01" y2="18"></line>
          </svg>
        </button>

        <!-- Manueller Refresh-Button -->
        <button
          id="btn-refresh"
          class="icon-button"
          aria-label="Feeds aktualisieren"
          title="Feeds aktualisieren"
        >
          <!-- SVG inline damit kein externes Bild geladen werden muss (Sam: keine img-src-Ausnahme nötig) -->
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
               aria-hidden="true">
            <polyline points="23 4 23 10 17 10"></polyline>
            <polyline points="1 20 1 14 7 14"></polyline>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
          </svg>
        </button>

        <!-- Einstellungs-Button (öffnet Modal) -->
        <button
          id="btn-settings"
          class="icon-button"
          aria-label="Einstellungen öffnen"
          title="Einstellungen"
          aria-haspopup="dialog"
          aria-controls="settings-modal"
        >
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
               aria-hidden="true">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>


      </div>
    </header><!-- /app-header -->


    <!-- ── Filter-Chips ───────────────────────────────────────────── -->
    <!--
      ui.js rendert hier dynamisch einen Chip pro aktiver Kategorie.
      "Alle" ist immer der erste Chip.
      Keine statischen Chips im HTML — Kategorien kommen aus config.js.
    -->
    <nav id="filter-chips" class="filter-chips" role="navigation" aria-label="Kategorie-Filter">
      <!-- Wird von ui.js befüllt -->
    </nav>


    <!-- ── Aktiver-Filter-Hinweis ──────────────────────────────────── -->
    <!--
      Erscheint wenn Kategorie- oder Quellen-Filter aktiv ist.
      Immer sichtbar ohne scrollen — ui.js setzt display via _renderChips().
    -->
    <div id="filter-active-bar" style="display:none;
         padding: var(--space-2) var(--space-4);
         display:none; align-items:center; gap:var(--space-2);
         border-bottom: 1px solid var(--color-border)">
      <span id="filter-active-label"
            style="flex:1; font-size:var(--font-size-sm); color:var(--color-text-secondary)"></span>
      <button id="btn-reset-filter"
              style="font-size:var(--font-size-sm); font-weight:600;
                     color:var(--color-accent); background:none; border:none;
                     cursor:pointer; padding:var(--space-1) 0; white-space:nowrap">
        × Alle anzeigen
      </button>
    </div>

    <!-- ── Haupt-Inhalt ───────────────────────────────────────────── -->
    <main id="app-main" class="app-main" role="main">

      <!-- Ladeindikator — sichtbar während feed.js arbeitet -->
      <div id="loading-indicator" class="status-message" role="status" aria-live="polite" style="display:none">
        <div class="spinner" aria-hidden="true"></div>
        <p class="status-message__text">Feeds werden geladen …</p>
      </div>

      <!-- Fehlermeldung — sichtbar wenn alle Feeds fehlgeschlagen sind -->
      <div id="error-message" class="status-message" role="alert" aria-live="assertive" style="display:none">
        <div class="status-message__icon" aria-hidden="true">⚠️</div>
        <p class="status-message__text">Feeds konnten nicht geladen werden.</p>
        <p class="status-message__sub">Bitte Internetverbindung prüfen und erneut versuchen.</p>
      </div>

      <!-- Leer-Zustand — alle Artikel weggefiltert oder weggewischt -->
      <div id="empty-message" class="status-message" style="display:none">
        <div class="status-message__icon" aria-hidden="true">✅</div>
        <p class="status-message__text">Alles gelesen!</p>
        <p class="status-message__sub">Keine weiteren Artikel für diese Auswahl.</p>
        <!-- Erscheint nur wenn Kategorie- oder Quellen-Filter aktiv ist -->
        <button id="btn-clear-filter-from-empty" class="btn btn--ghost"
                style="display:none; margin-top: var(--space-3)">
          Alle Artikel anzeigen
        </button>
      </div>

      <!-- Card-Grid — ui.js rendert hier die Artikel-Cards -->
      <section
        id="card-grid"
        class="card-grid"
        aria-label="Artikel-Feed"
        style="display:none"
      >
        <!-- Wird von ui.js befüllt — kein innerHTML, nur createElement -->
      </section>

    </main><!-- /app-main -->

  </div><!-- /app-shell -->


  <!-- ═══════════════════════════════════════════════════════════════════
       "WENIGER DAVON"-MENÜ (Context-Menu / Bottom-Sheet)
       Außerhalb der App-Shell damit z-index-Stacking korrekt funktioniert.
       ═══════════════════════════════════════════════════════════════════ -->
  <div
    id="context-menu"
    class="context-menu"
    role="menu"
    aria-label="Artikel-Optionen"
    aria-hidden="true"
  >
    <div class="context-menu__handle" aria-hidden="true"></div>
    <p class="context-menu__title" id="context-menu-title">Optionen</p>

    <button id="ctx-block-source" class="context-menu__item" role="menuitem">
      <!-- Text wird von ui.js per textContent gesetzt — kein innerHTML -->
      <span aria-hidden="true">🚫</span>
      <span id="ctx-block-source-label">Quelle blockieren</span>
    </button>

    <button id="ctx-block-keyword" class="context-menu__item" role="menuitem">
      <span aria-hidden="true">🔕</span>
      <span id="ctx-block-keyword-label">Keyword blockieren</span>
    </button>

    <button id="ctx-hide-category" class="context-menu__item" role="menuitem">
      <span aria-hidden="true">👁️</span>
      <span id="ctx-hide-category-label">Kategorie ausblenden</span>
    </button>

  </div><!-- /context-menu -->

  <!-- Backdrop für Context-Menu auf Mobile -->
  <div id="context-menu-backdrop" style="display:none; position:fixed; inset:0; z-index:199;"
       aria-hidden="true"></div>


  <!-- ═══════════════════════════════════════════════════════════════════
       EINSTELLUNGS-MODAL
       ═══════════════════════════════════════════════════════════════════ -->
  <div
    id="settings-modal-backdrop"
    class="modal-backdrop"
    role="presentation"
    aria-hidden="true"
  >
    <div
      id="settings-modal"
      class="modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="settings-modal-title"
    >

      <div class="modal__header">
        <h2 id="settings-modal-title" class="modal__title">Einstellungen</h2>
        <button id="btn-close-settings" class="icon-button" aria-label="Einstellungen schließen">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
               aria-hidden="true">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6"  y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>


      <div id="settings-content" class="settings-content">
        <!-- Wird dynamisch von ui.ts befüllt (_renderSettingsContent) -->
        <div style="text-align:center; color:var(--color-text-tertiary); padding:var(--space-8)">
          Einstellungen werden geladen...
        </div>
      </div>

    </div><!-- /settings-modal -->
  </div><!-- /settings-modal-backdrop -->


  <!-- ═══════════════════════════════════════════════════════════════════
       FEED-MANAGER MODAL
       ═══════════════════════════════════════════════════════════════════ -->
  <div
    id="feed-manager-backdrop"
    class="modal-backdrop"
    role="presentation"
    aria-hidden="true"
  >
    <div
      id="feed-manager"
      class="modal modal--wide"
      role="dialog"
      aria-modal="true"
      aria-labelledby="feed-manager-title"
    >
      <div class="modal__header">
        <h2 id="feed-manager-title" class="modal__title">Feeds verwalten</h2>
        <button id="btn-close-feed-manager" class="icon-button" aria-label="Feed-Manager schließen">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
               aria-hidden="true">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6"  y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>

      <!-- Suchfeld — filtert die Liste live -->
      <input
        id="feed-search"
        type="search"
        class="feed-search"
        placeholder="Feeds durchsuchen …"
        autocomplete="off"
        spellcheck="false"
      >

      <!-- Feed-Liste — wird von feed-manager.js befüllt -->
      <div id="feed-list" role="list" aria-label="Verfügbare Feeds"></div>

      <!-- Eigener Feed hinzufügen -->
      <details class="custom-feed-section" id="custom-feed-section">
        <summary class="custom-feed-section__toggle">➕ Eigenen Feed hinzufügen</summary>

        <form id="custom-feed-form" class="custom-feed-form" novalidate>

          <div class="form-row form-row--url">
            <div style="flex:1; display:flex; flex-direction:column; gap:var(--space-1)">
              <label for="cf-url">Feed-URL *</label>
              <input id="cf-url" name="url" type="url"
                     placeholder="https://example.com/feed.xml" required>
            </div>
            <button type="button" id="btn-check-feed" class="btn btn--ghost"
                    style="align-self:flex-end; white-space:nowrap">
              Überprüfen
            </button>
          </div>

          <!-- Vorschau nach URL-Check — wird von feed-manager.js befüllt -->
          <div id="feed-preview" class="feed-preview" style="display:none"></div>

          <div class="form-row">
            <label for="cf-name">Name *</label>
            <input id="cf-name" name="name" type="text" placeholder="Mein Blog" required>
          </div>

          <div class="form-row">
            <label for="cf-category">Kategorie</label>
            <select id="cf-category" name="category">
              <!-- Wird von feed-manager.js aus CONFIG.CATEGORIES befüllt -->
            </select>
          </div>

          <div class="form-row">
            <label for="cf-language">Sprache</label>
            <select id="cf-language" name="language">
              <option value="de">Deutsch</option>
              <option value="en">English</option>
            </select>
          </div>

          <button type="submit" class="btn btn--primary btn--full">
            Feed hinzufügen
          </button>

        </form>
      </details>

    </div><!-- /feed-manager -->
  </div><!-- /feed-manager-backdrop -->



</body>
</html>

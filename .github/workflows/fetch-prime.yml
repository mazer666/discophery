name: Prefetch Amazon Prime (werstreamt.es)

# Läuft 2× täglich zu ungenauen Uhrzeiten + zufälliger Verzögerung,
# damit der Fetch-Pattern nicht wie ein offensichtlicher Bot aussieht.
# Neue Prime-Inhalte erscheinen typisch wöchentlich — 2× täglich reicht.

on:
  schedule:
    - cron: '17 7 * * *'   # 07:17 UTC (~09:17 CEST)
    - cron: '43 19 * * *'  # 19:43 UTC (~21:43 CEST)
  workflow_dispatch:        # Manueller Trigger zum Testen

jobs:
  fetch-prime:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Random delay (0–10 min)
        # Zufällige Verzögerung macht den genauen Fetch-Zeitpunkt unvorhersehbar
        run: sleep $((RANDOM % 600))

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Scrape werstreamt.es
        run: python scripts/fetch_prime.py
        continue-on-error: true

      - name: Commit and push cache
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/amazon-prime-cache.json
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update amazon-prime cache"
          git push origin main
        continue-on-error: true

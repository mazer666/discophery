name: Prefetch Streaming (werstreamt.es)

# Ruft neue Flatrate-Inhalte von 7 Streaming-Anbietern via RSS ab (werstreamt.es ?rss).
# Läuft 2× täglich zu ungenauen Uhrzeiten + zufälliger Verzögerung,
# damit der Fetch-Pattern nicht wie ein regulärer Bot aussieht.
# Neue Streaming-Inhalte erscheinen typisch wöchentlich — 2× täglich reicht.
#
# Anbieter: Amazon Prime, Netflix, Disney+, Apple TV+,
#           Filmfriend, MagentaTV, Netzkino

on:
  schedule:
    - cron: '23 3 * * *'   # 03:23 UTC + 0–2 Min Delay = spätestens 03:25 UTC (~04:25 CET / 05:25 CEST, immer vor 06:00)
    - cron: '43 19 * * *'  # 19:43 UTC (~21:43 CEST / 20:43 CET)
  workflow_dispatch:        # Manueller Trigger zum Testen

jobs:
  fetch-streaming:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Random delay (0–2 min)
        # Zufällige Verzögerung macht den genauen Fetch-Zeitpunkt unvorhersehbar
        run: sleep $((RANDOM % 120))

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch RSS feeds (werstreamt.es)
        run: python scripts/fetch_streaming.py
        continue-on-error: true

      - name: Commit and push caches
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/streaming-*.json
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update streaming caches"
          git push origin main
        continue-on-error: true
